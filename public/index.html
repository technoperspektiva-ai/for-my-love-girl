<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Stage 2 · Від мене — для твого теплого вечора</title>
  <style>
    :root {
      --warm: #ffd79b;
      --warm-2: #ffe8bf;
      --rose: #e18988;
      --rose-dark: #281317;
      --ink: #fff1df;
      --muted: #f1cbbb;
      --line: rgba(255, 206, 147, .42);
      --card-pad: clamp(12px, 3vw, 30px);
      --radius: clamp(18px, 4vw, 28px);
      --cellMax: 42px;
      --gap: clamp(2px, .9vw, 5px);
    }

    * { box-sizing: border-box; }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
      background: #070506;
    }

    body {
      margin: 0;
      min-height: 100svh;
      width: 100%;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 170, 104, .22), transparent min(72vw, 26rem)),
        radial-gradient(circle at 20% 90%, rgba(255, 119, 139, .14), transparent min(78vw, 24rem)),
        linear-gradient(180deg, #070506 0%, #180d10 50%, #281317 100%);
      font-family: Georgia, "Times New Roman", serif;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 16px;
      min-height: 44px;
      font: 900 14px/1 system-ui, -apple-system, Segoe UI, sans-serif;
      border: 1px solid rgba(255, 236, 200, .65);
      transition: transform .16s ease, filter .16s ease, box-shadow .16s ease;
      touch-action: manipulation;
    }

    button:active { transform: translateY(1px); }
    button:disabled { opacity: .52; cursor: not-allowed; }

    .app {
      width: min(100%, 1180px);
      margin: 0 auto;
      padding:
        max(env(safe-area-inset-top), clamp(6px, 1.5vw, 14px))
        clamp(6px, 1.8vw, 16px)
        max(env(safe-area-inset-bottom), clamp(10px, 2vw, 18px));
    }

    .shell {
      width: 100%;
      min-height: calc(100svh - 20px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topbar {
      position: sticky;
      top: max(env(safe-area-inset-top), 6px);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 12px;
      border: 1px solid rgba(255, 206, 147, .18);
      border-radius: 999px;
      background: rgba(18, 10, 12, .78);
      backdrop-filter: blur(12px);
      color: #ffd8ad;
      font: 800 clamp(12px, 2.2vw, 14px)/1.35 system-ui, -apple-system, Segoe UI, sans-serif;
    }

    .topbar small {
      color: rgba(255, 232, 201, .76);
      font-weight: 700;
      white-space: nowrap;
    }

    .card {
      position: relative;
      width: 100%;
      flex: 1;
      overflow: visible;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 189, 123, .14), transparent min(80vw, 30rem)),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        rgba(18, 10, 12, .94);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.055),
        0 24px 70px rgba(0,0,0,.46);
      padding: var(--card-pad);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: clamp(7px, 1.6vw, 12px);
      border-radius: calc(var(--radius) - 6px);
      border: 1px solid rgba(255, 206, 147, .18);
      pointer-events: none;
    }

    .view {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100%;
    }

    .title {
      margin: 0 0 8px;
      color: var(--warm);
      text-align: center;
      font-size: clamp(30px, 8.2vw, 68px);
      line-height: .98;
      letter-spacing: -.02em;
      overflow-wrap: balance;
      text-shadow: 0 0 28px rgba(255, 166, 105, .18);
    }

    .subtitle {
      margin: 0 auto clamp(12px, 2vw, 18px);
      max-width: 760px;
      text-align: center;
      color: var(--muted);
      font: 700 clamp(14px, 2.5vw, 17px)/1.55 system-ui, -apple-system, Segoe UI, sans-serif;
      text-wrap: pretty;
    }

    .hero {
      min-height: min(720px, calc(100svh - 90px));
      display: grid;
      place-items: center;
      text-align: center;
      padding: clamp(6px, 2vw, 18px) 0;
    }

    .hero-box {
      width: min(100%, 780px);
      padding: clamp(18px, 5vw, 38px);
      border-radius: clamp(20px, 5vw, 30px);
      border: 1.5px solid rgba(225, 153, 143, .45);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 197, 139, .42), transparent 70%),
        linear-gradient(180deg, rgba(43, 18, 22, .92), rgba(18, 10, 12, .94));
      box-shadow: 0 20px 60px rgba(87, 28, 32, .28);
    }

    .hero-kicker {
      display: inline-block;
      margin-bottom: 10px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255, 206, 147, .2);
      color: #ffd8ad;
      font: 900 12px/1 system-ui, -apple-system, Segoe UI, sans-serif;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .hero-note {
      margin: 14px auto 0;
      max-width: 620px;
      color: #f5d4c4;
      font: 700 clamp(14px, 2.5vw, 16px)/1.55 system-ui, -apple-system, Segoe UI, sans-serif;
      text-wrap: pretty;
    }

    .primary {
      min-width: min(100%, 230px);
      color: #21100d;
      background: linear-gradient(180deg, #ffe0a8, #e78f8e);
      border-color: rgba(255, 236, 200, .65);
      box-shadow: 0 0 26px rgba(225, 137, 136, .45), 0 10px 24px rgba(30, 10, 12, .3);
    }

    .secondary {
      color: #ffe7cb;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255, 216, 174, .25);
      box-shadow: none;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }

    .warm-scene {
      position: relative;
      min-height: clamp(300px, 58svh, 540px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: clamp(18px, 4vw, 24px);
      border: 1px solid rgba(255, 206, 147, .25);
      background:
        radial-gradient(circle at 50% 25%, rgba(255, 225, 163, .34), transparent min(60vw, 18rem)),
        radial-gradient(circle at 50% 80%, rgba(255, 118, 142, .18), transparent min(70vw, 22rem)),
        linear-gradient(180deg, #21100f, #100909);
    }

    .warm-scene::before,
    .warm-scene::after {
      content: "";
      position: absolute;
      bottom: -30%;
      width: 52%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(255,255,255,.18), transparent 64%);
      filter: blur(18px);
      animation: steam 7s ease-in-out infinite;
      opacity: .48;
    }

    .warm-scene::before { left: 8%; animation-delay: -.8s; }
    .warm-scene::after { right: 8%; animation-delay: -3.2s; }

    @keyframes steam {
      0% { transform: translateY(44px) scale(.92); opacity: .16; }
      45% { opacity: .55; }
      100% { transform: translateY(-110px) scale(1.15); opacity: .08; }
    }

    .intro-text {
      position: relative;
      z-index: 1;
      width: min(100%, 700px);
      padding: clamp(16px, 4vw, 28px);
      border-radius: 22px;
      text-align: center;
      color: #fff1df;
      background: rgba(0,0,0,.18);
      backdrop-filter: blur(6px);
      font-size: clamp(19px, 5.2vw, 34px);
      line-height: 1.36;
      white-space: pre-line;
      overflow-wrap: anywhere;
    }

    .lucio {
      max-width: 780px;
      margin: 18px auto;
      padding: clamp(14px, 3.4vw, 22px);
      border-radius: 22px;
      border: 1px solid rgba(255, 214, 158, .26);
      background:
        radial-gradient(circle at 18% 0%, rgba(255, 209, 139, .18), transparent 18rem),
        rgba(0,0,0,.22);
      color: #ffe9cd;
      font-size: clamp(17px, 4.4vw, 28px);
      line-height: 1.5;
      white-space: pre-line;
      overflow-wrap: anywhere;
    }

    .progress-box {
      position: sticky;
      top: calc(max(env(safe-area-inset-top), 6px) + 52px);
      z-index: 10;
      margin: 10px auto 14px;
      max-width: 780px;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid rgba(255, 206, 147, .2);
      background: rgba(34, 17, 18, .86);
      backdrop-filter: blur(10px);
      color: #ffdbae;
      text-align: center;
      font: 800 clamp(13px, 2.4vw, 15px)/1.45 system-ui, -apple-system, Segoe UI, sans-serif;
    }

    .lucio-bubble {
      margin: 10px auto 14px;
      max-width: 780px;
      padding: 13px 15px;
      border-radius: 18px 18px 18px 6px;
      background: rgba(226, 142, 141, .14);
      border: 1px solid rgba(226, 142, 141, .32);
      color: #ffe6d5;
      font: 700 clamp(14px, 2.6vw, 16px)/1.55 system-ui, -apple-system, Segoe UI, sans-serif;
      text-wrap: pretty;
    }

    .milestones {
      max-width: 780px;
      margin: 0 auto 12px;
      display: grid;
      gap: 8px;
    }

    .milestone {
      display: none;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 206, 147, .18);
      background: rgba(255, 220, 165, .08);
      color: #f9d8b9;
      font: 700 14px/1.45 system-ui, -apple-system, Segoe UI, sans-serif;
    }

    .milestone.visible { display: block; }

    .word-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(8px, 1.4vw, 14px);
      max-width: 1040px;
      margin: 0 auto;
    }

    .word {
      min-width: 0;
      padding: clamp(9px, 1.8vw, 14px);
      border-radius: 18px;
      border: 1px solid rgba(255, 206, 147, .18);
      background: rgba(0,0,0,.18);
      transition: border-color .2s ease, background .2s ease, transform .2s ease;
    }

    .word.solved {
      border-color: rgba(255, 220, 151, .48);
      background: rgba(255, 205, 137, .1);
    }

    .word.active {
      transform: translateY(-1px);
      box-shadow: 0 0 0 2px rgba(225, 142, 141, .18);
    }

    .clue {
      margin-bottom: 8px;
      color: #f8dfc9;
      font: 800 clamp(13px, 2.35vw, 15px)/1.45 system-ui, -apple-system, Segoe UI, sans-serif;
      text-wrap: pretty;
    }

    .cells {
      --letters: 8;
      display: grid;
      grid-template-columns: repeat(var(--letters), minmax(0, 1fr));
      gap: var(--gap);
      width: min(100%, calc(var(--letters) * var(--cellMax) + (var(--letters) - 1) * var(--gap)));
      max-width: 100%;
    }

    .cell {
      width: 100%;
      aspect-ratio: 1 / 1.15;
      min-width: 0;
      min-height: 32px;
      border-radius: clamp(7px, 2vw, 10px);
      border: 1.5px solid rgba(255, 217, 164, .34);
      color: #fff5e9;
      background: rgba(255,255,255,.07);
      text-align: center;
      text-transform: uppercase;
      outline: none;
      font: 900 clamp(15px, 5vw, 25px)/1 Arial, sans-serif;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
      padding: 0;
    }

    .cell:focus {
      border-color: rgba(255, 219, 151, .86);
      box-shadow: 0 0 18px rgba(255, 175, 120, .25);
      background: rgba(255, 218, 168, .12);
    }

    .cell.correct {
      background: rgba(254, 209, 144, .18);
      border-color: rgba(255, 221, 161, .7);
      box-shadow: 0 0 16px rgba(255, 184, 115, .22);
    }

    .final {
      min-height: clamp(420px, 72svh, 620px);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 230, 174, .34), transparent min(60vw, 18rem)),
        radial-gradient(circle at 50% 100%, rgba(255, 124, 147, .20), transparent min(70vw, 24rem)),
        linear-gradient(180deg, #22100f, #0d0808);
      overflow: hidden;
      position: relative;
    }

    .final::before {
      content: "";
      position: absolute;
      inset: -20%;
      background: radial-gradient(circle, rgba(255, 219, 160, .2), transparent 46%);
      animation: glow 4s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { transform: scale(.94); opacity: .45; }
      50% { transform: scale(1.12); opacity: .9; }
    }

    .final-message {
      position: relative;
      z-index: 1;
      max-width: 720px;
      padding: clamp(16px, 4vw, 26px);
      text-align: center;
      color: #fff1df;
      font-size: clamp(18px, 4.8vw, 34px);
      line-height: 1.45;
      white-space: pre-line;
      overflow-wrap: anywhere;
    }

    @media (min-width: 760px) {
      .word-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .word:nth-child(25) {
        grid-column: 1 / -1;
        max-width: 520px;
        justify-self: center;
        width: 100%;
      }
    }

    @media (min-width: 1100px) {
      .word-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .word:nth-child(25) {
        grid-column: auto;
        max-width: none;
      }
    }

    @media (max-width: 560px) {
      :root {
        --cellMax: 38px;
        --card-pad: 10px;
      }

      .app {
        padding-left: 6px;
        padding-right: 6px;
      }

      .shell {
        gap: 8px;
      }

      .topbar {
        border-radius: 16px;
        align-items: flex-start;
      }

      .topbar small {
        display: none;
      }

      .card {
        border-radius: 18px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .actions button,
      .primary,
      .secondary {
        width: 100%;
      }

      .hero {
        min-height: auto;
        padding: 10px 0;
      }

      .hero-box {
        border-radius: 20px;
      }

      .progress-box {
        top: calc(max(env(safe-area-inset-top), 6px) + 46px);
      }

      .word {
        border-radius: 15px;
      }

      .clue {
        margin-bottom: 7px;
      }

      .cell {
        min-height: 29px;
      }
    }

    @media (max-width: 360px) {
      :root {
        --cellMax: 34px;
        --gap: 2px;
      }

      .title {
        font-size: clamp(26px, 8.5vw, 34px);
      }

      .subtitle,
      .hero-note,
      .lucio-bubble,
      .progress-box {
        font-size: 13px;
      }

      .cell {
        min-height: 27px;
        font-size: 14px;
      }
    }

    @media (orientation: landscape) and (max-height: 520px) {
      .hero {
        min-height: auto;
      }

      .warm-scene,
      .final {
        min-height: 300px;
      }

      .title {
        font-size: clamp(28px, 6vw, 44px);
      }
    }


    .after-crossword {
      max-width: 820px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .mini-room {
      max-width: 860px;
      margin: 0 auto;
      padding: clamp(14px, 3vw, 22px);
      border-radius: 22px;
      border: 1px solid rgba(255, 206, 147, .24);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 218, 161, .16), transparent 70%),
        rgba(0, 0, 0, .20);
    }

    .room-count {
      display: block;
      width: max-content;
      max-width: 100%;
      margin: 0 auto 10px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255, 206, 147, .2);
      color: #ffd8ad;
      font: 900 12px/1 system-ui, -apple-system, Segoe UI, sans-serif;
      letter-spacing: .09em;
      text-transform: uppercase;
    }

    .room-scene,
    .room-puzzle,
    .room-lucio,
    .room-result,
    .room-hint {
      margin: 10px auto;
      max-width: 760px;
      padding: 13px 15px;
      border-radius: 18px;
      font: 700 clamp(15px, 2.7vw, 17px)/1.55 system-ui, -apple-system, Segoe UI, sans-serif;
      text-wrap: pretty;
    }

    .room-scene {
      color: #ffe9d1;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255, 206, 147, .16);
    }

    .room-lucio {
      color: #ffe7d8;
      background: rgba(226, 142, 141, .14);
      border: 1px solid rgba(226, 142, 141, .32);
    }

    .room-puzzle {
      color: #fff4da;
      background: rgba(255, 218, 161, .08);
      border: 1px solid rgba(255, 206, 147, .24);
    }

    .room-result {
      min-height: 28px;
      color: #ffdca8;
      background: transparent;
      border: 0;
      padding-top: 4px;
      padding-bottom: 4px;
    }

    .room-hint {
      color: #f5d0be;
      background: rgba(255,255,255,.055);
      border: 1px dashed rgba(255, 206, 147, .28);
    }

    .quest-input-row {
      display: flex;
      gap: 8px;
      max-width: 680px;
      margin: 14px auto 0;
    }

    .quest-input {
      min-width: 0;
      flex: 1;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 217, 164, .34);
      color: #fff5e9;
      background: rgba(255,255,255,.07);
      outline: none;
      text-transform: uppercase;
      font: 900 16px/1 system-ui, -apple-system, Segoe UI, sans-serif;
    }

    .quest-input:focus {
      border-color: rgba(255, 219, 151, .86);
      box-shadow: 0 0 18px rgba(255, 175, 120, .25);
    }

    .lucio-log {
      max-width: 780px;
      margin: 10px auto 14px;
      display: grid;
      gap: 8px;
    }

    .lucio-log-line {
      padding: 10px 12px;
      border-radius: 14px 14px 14px 4px;
      color: #ffe8d8;
      background: rgba(226, 142, 141, .105);
      border: 1px solid rgba(226, 142, 141, .22);
      font: 700 13px/1.45 system-ui, -apple-system, Segoe UI, sans-serif;
    }

    @media (max-width: 560px) {
      .quest-input-row {
        flex-direction: column;
      }

      .quest-input-row button {
        width: 100%;
      }

      .mini-room {
        border-radius: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <div class="topbar">
        <span id="topStatus">Stage 2 · Від мене — для твого теплого вечора</span>
        <small>Тепло памʼятає кроки</small>
      </div>
      <article class="card">
        <div class="view" id="view"></div>
      </article>
    </div>
  </main>

  <script>
    const STAGE2_COMPLETED_KEY = 'stage2_completed';
    const STAGE2_ANSWERS_KEY = 'stage2_answers';
    const STAGE2_PHASE_KEY = 'stage2_phase';
    const STAGE2_STARTED_KEY = 'stage2_started';
    const STAGE2_POSTQUEST_KEY = 'stage2_postquest_index';

    const words = [
      { clue: 'Що зігріває краще за ковдру?', answer: 'ОБІЙМИ' },
      { clue: 'Те, що хочеться чути перед сном.', answer: 'ГОЛОС' },
      { clue: 'Маленький символ любові ❤️', answer: 'СЕРЦЕ' },
      { clue: 'Те, що залишається після зустрічі.', answer: 'СПОГАД' },
      { clue: 'Те, що ти робиш, коли думаєш про мене.', answer: 'УСМІШКА' },
      { clue: 'Смак ранку разом.', answer: 'КАВА' },
      { clue: 'Те, що гріє всередині.', answer: 'ПОЧУТТЯ' },
      { clue: 'Коли очі говорять більше.', answer: 'ПОГЛЯД' },
      { clue: 'Ніч без тебе.', answer: 'СУМ' },
      { clue: 'Те, що я хочу тримати.', answer: 'РУКА' },
      { clue: 'Твій стан поруч зі мною.', answer: 'СПОКІЙ' },
      { clue: 'Коли час зникає.', answer: 'МИТЬ' },
      { clue: 'Щось дуже ніжне.', answer: 'ДОТИК' },
      { clue: 'Те, що я чекаю.', answer: 'ЗУСТРІЧ' },
      { clue: 'Щось, що ти робиш несвідомо.', answer: 'ДИХАННЯ' },
      { clue: 'Те, що зʼєднує нас.', answer: 'ЗВЯЗОК' },
      { clue: 'Щось, що я памʼятаю завжди.', answer: 'МРІЯ' },
      { clue: 'Коли ти поруч — це…', answer: 'ДІМ' },
      { clue: 'Те, що я хочу сказати.', answer: 'ЛЮБЛЮ' },
      { clue: 'Щось тепле і тихе.', answer: 'ВЕЧІР' },
      { clue: 'Те, що зʼявляється при думці про тебе.', answer: 'РАДІСТЬ' },

      return (value || '')

      if (count >= 5) return 'Люсіо: Світло стало трохи теплішим… Він знав, що ти знайдеш цей шлях.';
      return 'Люсіо: Я поруч, але говоритиму тихо. Нехай слова самі виходять із тепла, яке для тебе залишили.';

    function vibrate(ms = 35) {

    function ensureAudio() {
      if (audio) return audio;
      try {
        audio = new (window.AudioContext || window.webkitAudioContext)();
        return audio;
      } catch (e) {
        return null;
      }
    }

    function clickSound() {
      const ctx = ensureAudio();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = 520;
      gain.gain.value = 0.035;
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.13);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.14);
    }

    function startAmbient() {
      const ctx = ensureAudio();
      if (!ctx || ambientNodes.length) return;
      const gain = ctx.createGain();
      gain.gain.value = 0.012;
      gain.connect(ctx.destination);
      [128, 192].forEach(freq => {
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.connect(gain);
        osc.start();
        ambientNodes.push(osc);
      });
      ambientNodes.push(gain);
    }

    function typeText(target, text, speed = 22) {
      target.textContent = '';
      let i = 0;
      const timer = setInterval(() => {
        target.textContent += text[i] || '';
        i += 1;
        if (i >= text.length) clearInterval(timer);
      }, speed);
      return timer;
    }

    function renderLucioLog() {

        count >= 15 ? 'Люсіо: Пʼятнадцять. Ти не просто проходиш гру — ти розмотуєш нитку, яку він сховав дуже обережно.' : '',

    function renderMilestones() {

      if (!box) return;

      box.innerHTML = '';
      [5, 10, 15, 20].forEach(limit => {

        div.className = 'milestone' + (count >= limit ? ' visible' : '');

      });

    function renderWords() {
      const list = document.getElementById('wordList');
      if (!list) return;
      list.innerHTML = '';

      words.forEach((word, index) => {
        const saved = normalize(answers[index] || '');
        const solved = saved === word.answer;
        const row = document.createElement('section');
        row.className = 'word' + (solved ? ' solved' : '');
        row.dataset.index = index;

        const clue = document.createElement('div');
        clue.className = 'clue';
        clue.textContent = `${index + 1}. ${word.clue}`;
        row.appendChild(clue);

        const cells = document.createElement('div');
        cells.className = 'cells';
        cells.style.setProperty('--letters', word.answer.length);

        [...word.answer].forEach((letter, letterIndex) => {
          const input = document.createElement('input');
          input.className = 'cell' + (solved ? ' correct' : '');
          input.maxLength = 1;
          input.autocomplete = 'off';
          input.inputMode = 'text';
          input.dataset.index = index;
          input.dataset.letter = letterIndex;
          input.value = saved[letterIndex] || '';
          input.addEventListener('focus', () => row.classList.add('active'));
          input.addEventListener('blur', () => row.classList.remove('active'));
          input.addEventListener('input', () => {
            input.value = normalize(input.value).slice(0, 1);
            collectWord(index);
            if (input.value) {
              const next = cells.querySelector(`[data-letter="${letterIndex + 1}"]`);
              if (next) next.focus();
            }
            checkWord(index);
          });
          input.addEventListener('keydown', event => {
            if (event.key === 'Backspace' && !input.value) {
              const prev = cells.querySelector(`[data-letter="${letterIndex - 1}"]`);
              if (prev) {
                event.preventDefault();
                prev.focus();
              }
            }
            if (event.key === 'Enter') checkWord(index, true);
          });
          cells.appendChild(input);
        });

        row.appendChild(cells);
        list.appendChild(row);
      });
    }

    function collectWord(index) {
      const row = document.querySelector(`.word[data-index="${index}"]`);
      if (!row) return '';
      const value = [...row.querySelectorAll('.cell')].map(input => input.value || '').join('');
      answers[index] = normalize(value);
      saveAnswers();
      return answers[index];
    }

    function checkWord(index, manual = false) {
      const word = words[index];
      const row = document.querySelector(`.word[data-index="${index}"]`);
      if (!row) return;
      const value = collectWord(index);
      if (value.length < word.answer.length) return;

      if (value === word.answer) {
        const wasSolved = row.classList.contains('solved');
        row.classList.add('solved');
        row.querySelectorAll('.cell').forEach(cell => cell.classList.add('correct'));
        if (!wasSolved) {
          vibrate(35);
          clickSound();
        }
        saveAnswers();
        updateProgress();
      } else if (manual) {
        vibrate(80);
      }
    }

    function updateProgress() {
      const count = solvedCount();
      const progress = document.getElementById('progress');
      const lucio = document.getElementById('lucioBubble');
      if (progress) progress.textContent = `${count} / 25 відповідей збережено`;
      if (lucio) lucio.textContent = lucioLine(count);
      renderMilestones();
      renderLucioLog();

      if (count >= 25 && !isCompleted()) {
        setTimeout(showAfterCrossword, 900);
      }
    }

        <section class="mini-room">
          <span class="room-count">Після кросворду · кімната ${current + 1} / ${postQuests.length}</span>
          <h2 class="title">${room.title}</h2>
          <div class="room-scene">${room.scene}</div>
          <div class="room-lucio">${room.lucio}</div>
          <div class="room-puzzle">${room.puzzle}</div>
          <div class="quest-input-row">
            <input class="quest-input" id="postQuestAnswer" autocomplete="off" placeholder="Введи відповідь" />
            <button class="primary" type="button" onclick="checkPostQuestAnswer()">Відкрити</button>
          </div>
          <div class="actions">
            <button class="secondary" type="button" onclick="showPostQuestHint()">Підказка</button>
            <button class="secondary" type="button" onclick="showCrossword()">Назад до кросворду</button>
          </div>
          <div class="room-hint" id="postQuestHint" hidden>${room.hint}</div>
          <div class="room-result" id="postQuestResult"></div>
        </section>`;
      setTimeout(() => {
        const input = document.getElementById('postQuestAnswer');
        if (input) input.focus();
      }, 80);
      document.getElementById('postQuestAnswer').addEventListener('keydown', event => {
        if (event.key === 'Enter') checkPostQuestAnswer();
      });
    }

    function showPostQuestHint() {
      const hint = document.getElementById('postQuestHint');
      if (!hint) return;
      hint.hidden = !hint.hidden;
      vibrate(20);
    }

    function checkPostQuestAnswer() {
      const current = Number(localStorage.getItem(STAGE2_POSTQUEST_KEY) || '0');
      const room = postQuests[current];
      const input = document.getElementById('postQuestAnswer');
      const result = document.getElementById('postQuestResult');
      const answer = normalize(input.value);

      if (answer !== room.answer) {
        result.textContent = 'Люсіо: Ні… але відповідь зовсім поруч. Придивись до того, що вже було в словах.';
        vibrate(80);
        return;
      }

      clickSound();
      vibrate(45);
      result.innerHTML = `<b>Відкрито.</b> ${room.success}<br><br>Люсіо: Я запамʼятав цей крок. Тепер можна йти далі.`;

      setTimeout(() => {
        if (current >= postQuests.length - 1) {
          showFinal();
        } else {
          localStorage.setItem(STAGE2_POSTQUEST_KEY, String(current + 1));
          showPostQuest(current + 1);
        }
      }, 2400);
    }

    function showFinal() {
      localStorage.setItem(STAGE2_COMPLETED_KEY, 'true');
      localStorage.setItem(STAGE2_PHASE_KEY, 'final');
      saveAnswers();
      document.getElementById('topStatus').textContent = 'Stage 2 · Фінал';

      const view = document.getElementById('view');
      view.innerHTML = `
        <h2 class="title">Остання підказка</h2>
        <p class="subtitle">Екран темніє мʼяко, як вечір перед вікном. Голос стає тихішим, щоб не злякати тепло, яке щойно розгорілося.</p>
        <div class="final">
          <div class="final-message" id="finalText"></div>
        </div>
        <div class="actions">
          <button class="primary" type="button" onclick="showHome()">Завершити Stage 2</button>
          <button class="secondary" type="button" onclick="showCrossword()">Повернутися до кросворду</button>
        </div>`;

      const text = 'Люсіо:\n\nТи пройшла…\n\nСлова склалися, світло не згасло, і тепер лишилась остання підказка.\n\nВ шафі…\n\nТам, де стоять діди морози 🎅\n\nНа тебе чекає…\n\nвихідний сюрприз.\n\nІ ще дещо…\n\nЯ дуже скучив, сонечко…\n\nІ скоро буду вдома.\n\nА це тобі…\nдля гарного початку гарних вихідних ❤️';
      typeText(document.getElementById('finalText'), text, 28);
      vibrate(90);
    }

    function showCompleted() {
      loadAnswers();
      document.getElementById('topStatus').textContent = 'Stage 2 · Пройдений етап';

      const view = document.getElementById('view');
      view.innerHTML = `
        <h2 class="title">Ти вже пройшла цей етап…</h2>
        <p class="subtitle">Усе збережено: відповіді, тепло і остання підказка. Двері не зникли — вони просто прикриті до наступного дотику.</p>
        <div class="lucio">Люсіо:\n\nЯ памʼятаю твої кроки.\nЦей етап завершено, але він не зник.\nТи можеш повернутись до кросворду, пройти кімнати після нього або переглянути фінальне повідомлення ще раз.</div>
        <div class="actions">
          <button class="primary" type="button" onclick="showFinal()">Переглянути фінал</button>
          <button class="secondary" type="button" onclick="showAfterCrossword()">Кімнати після кросворду</button>
          <button class="secondary" type="button" onclick="showCrossword()">Повернутись до кросворду</button>
          <button class="secondary" type="button" onclick="showHome()">На початок</button>
          <button class="secondary" type="button" onclick="resetStage2()">Скинути Stage 2</button>
        </div>`;
    }

    function resetStage2() {
      const ok = confirm('Стерти прогрес Stage 2 і пройти його заново?');
      if (!ok) return;
      try {
        localStorage.removeItem(STAGE2_COMPLETED_KEY);
        localStorage.removeItem(STAGE2_ANSWERS_KEY);
        localStorage.removeItem(STAGE2_PHASE_KEY);
        localStorage.removeItem(STAGE2_STARTED_KEY);
        localStorage.removeItem(STAGE2_POSTQUEST_KEY);
      } catch (e) {}
      answers = {};
      showHome();
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadAnswers();
      const phase = localStorage.getItem(STAGE2_PHASE_KEY);
      if (isCompleted()) showCompleted();
      else if (phase === 'postquest' && solvedCount() >= 25) showPostQuest();
      else if (phase === 'crossword' || solvedCount() > 0) showCrossword();
      else showHome();
    });
  </script>
</body>
</html>
