<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Stage 2 · Від мене — для твого теплого вечора</title>
  <style>
    :root {
      --warm: #ffd79b;
      --rose: #e18988;
      --rose-dark: #281317;
      --ink: #fff1df;
      --muted: #f1cbbb;
      --line: rgba(255, 206, 147, .42);
    }

    * { box-sizing: border-box; }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100svh;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 170, 104, .22), transparent 24rem),
        radial-gradient(circle at 20% 90%, rgba(255, 119, 139, .14), transparent 22rem),
        linear-gradient(180deg, #070506 0%, #180d10 50%, #281317 100%);
      font-family: Georgia, "Times New Roman", serif;
      overflow-x: hidden;
    }

    button {
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 16px;
      font: 900 14px/1 system-ui, -apple-system, Segoe UI, sans-serif;
      border: 1px solid rgba(255, 236, 200, .65);
      transition: transform .16s ease, filter .16s ease, box-shadow .16s ease;
    }

    button:active { transform: translateY(1px); }
    button:disabled { opacity: .52; cursor: not-allowed; }

    .app {
      width: min(100%, 960px);
      min-height: 100svh;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
    }

    .shell {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      padding: 12px 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      color: #ffd8ad;
      font: 800 13px/1.35 system-ui, -apple-system, Segoe UI, sans-serif;
    }

    .topbar small {
      color: rgba(255, 232, 201, .72);
      font-weight: 700;
    }

    .card {
      position: relative;
      flex: 1;
      overflow: auto;
      border-radius: clamp(18px, 4vw, 28px);
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 189, 123, .14), transparent 28rem),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        rgba(18, 10, 12, .94);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.055),
        0 24px 70px rgba(0,0,0,.46);
      padding: clamp(16px, 4vw, 30px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: clamp(14px, 3vw, 22px);
      border: 1px solid rgba(255, 206, 147, .18);
      pointer-events: none;
    }

    .view {
      position: relative;
      z-index: 1;
      min-height: 100%;
    }

    .title {
      margin: 0 0 8px;
      color: var(--warm);
      text-align: center;
      font-size: clamp(34px, 8.6vw, 68px);
      line-height: .96;
      text-shadow: 0 0 28px rgba(255, 166, 105, .18);
    }

    .subtitle {
      margin: 0 auto 16px;
      max-width: 720px;
      text-align: center;
      color: var(--muted);
      font: 700 15px/1.55 system-ui, -apple-system, Segoe UI, sans-serif;
    }

    .hero {
      min-height: calc(100svh - 120px);
      display: grid;
      place-items: center;
      text-align: center;
    }

    .hero-box {
      width: min(100%, 760px);
      padding: clamp(18px, 5vw, 34px);
      border-radius: 28px;
      border: 1.5px solid rgba(225, 153, 143, .45);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 197, 139, .42), transparent 70%),
        linear-gradient(180deg, rgba(43, 18, 22, .92), rgba(18, 10, 12, .94));
      box-shadow: 0 20px 60px rgba(87, 28, 32, .28);
    }

    .hero-kicker {
      display: inline-block;
      margin-bottom: 10px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255, 206, 147, .2);
      color: #ffd8ad;
      font: 900 12px/1 system-ui, -apple-system, Segoe UI, sans-serif;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .hero-note {
      margin: 14px auto 0;
      max-width: 560px;
      color: #f5d4c4;
      font: 700 14px/1.5 system-ui, -apple-system, Segoe UI, sans-serif;
    }

    .primary {
      min-width: 230px;
      color: #21100d;
      background: linear-gradient(180deg, #ffe0a8, #e78f8e);
      border-color: rgba(255, 236, 200, .65);
      box-shadow: 0 0 26px rgba(225, 137, 136, .45), 0 10px 24px rgba(30, 10, 12, .3);
    }

    .secondary {
      color: #ffe7cb;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255, 216, 174, .25);
      box-shadow: none;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }

    .warm-scene {
      position: relative;
      min-height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(255, 206, 147, .25);
      background:
        radial-gradient(circle at 50% 25%, rgba(255, 225, 163, .34), transparent 18rem),
        radial-gradient(circle at 50% 80%, rgba(255, 118, 142, .18), transparent 22rem),
        linear-gradient(180deg, #21100f, #100909);
    }

    .warm-scene::before,
    .warm-scene::after {
      content: "";
      position: absolute;
      bottom: -30%;
      width: 52%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(255,255,255,.18), transparent 64%);
      filter: blur(18px);
      animation: steam 7s ease-in-out infinite;
      opacity: .48;
    }

    .warm-scene::before { left: 8%; animation-delay: -.8s; }
    .warm-scene::after { right: 8%; animation-delay: -3.2s; }

    @keyframes steam {
      0% { transform: translateY(44px) scale(.92); opacity: .16; }
      45% { opacity: .55; }
      100% { transform: translateY(-110px) scale(1.15); opacity: .08; }
    }

    .intro-text {
      position: relative;
      z-index: 1;
      max-width: 660px;
      padding: 24px;
      border-radius: 22px;
      text-align: center;
      color: #fff1df;
      background: rgba(0,0,0,.18);
      backdrop-filter: blur(6px);
      font-size: clamp(20px, 5vw, 34px);
      line-height: 1.35;
      white-space: pre-line;
    }

    .lucio {
      max-width: 760px;
      margin: 18px auto;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid rgba(255, 214, 158, .26);
      background:
        radial-gradient(circle at 18% 0%, rgba(255, 209, 139, .18), transparent 18rem),
        rgba(0,0,0,.22);
      color: #ffe9cd;
      font-size: clamp(18px, 4.7vw, 28px);
      line-height: 1.45;
      white-space: pre-line;
    }

    .progress-box {
      margin: 10px auto 14px;
      max-width: 780px;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid rgba(255, 206, 147, .2);
      background: rgba(255,255,255,.06);
      color: #ffdbae;
      text-align: center;
      font: 800 14px/1.45 system-ui, -apple-system, Segoe UI, sans-serif;
    }

    .lucio-bubble {
      margin: 10px auto 14px;
      max-width: 780px;
      padding: 13px 15px;
      border-radius: 18px 18px 18px 6px;
      background: rgba(226, 142, 141, .14);
      border: 1px solid rgba(226, 142, 141, .32);
      color: #ffe6d5;
      font: 700 15px/1.5 system-ui, -apple-system, Segoe UI, sans-serif;
    }

    .milestones {
      max-width: 780px;
      margin: 0 auto 12px;
      display: grid;
      gap: 8px;
    }

    .milestone {
      display: none;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 206, 147, .18);
      background: rgba(255, 220, 165, .08);
      color: #f9d8b9;
      font: 700 14px/1.45 system-ui, -apple-system, Segoe UI, sans-serif;
    }

    .milestone.visible { display: block; }

    .word-list {
      display: grid;
      gap: 10px;
      max-width: 860px;
      margin: 0 auto;
    }

    .word {
      padding: 12px;
      border-radius: 18px;
      border: 1px solid rgba(255, 206, 147, .18);
      background: rgba(0,0,0,.18);
      transition: border-color .2s ease, background .2s ease, transform .2s ease;
    }

    .word.solved {
      border-color: rgba(255, 220, 151, .48);
      background: rgba(255, 205, 137, .1);
    }

    .word.active {
      transform: translateY(-1px);
      box-shadow: 0 0 0 2px rgba(225, 142, 141, .18);
    }

    .clue {
      margin-bottom: 8px;
      color: #f8dfc9;
      font: 800 14px/1.4 system-ui, -apple-system, Segoe UI, sans-serif;
    }

    .cells {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .cell {
      width: clamp(31px, 8.2vw, 42px);
      height: clamp(36px, 9.4vw, 48px);
      border-radius: 10px;
      border: 1.5px solid rgba(255, 217, 164, .34);
      color: #fff5e9;
      background: rgba(255,255,255,.07);
      text-align: center;
      text-transform: uppercase;
      outline: none;
      font: 900 clamp(18px, 5.6vw, 25px)/1 Arial, sans-serif;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }

    .cell:focus {
      border-color: rgba(255, 219, 151, .86);
      box-shadow: 0 0 18px rgba(255, 175, 120, .25);
      background: rgba(255, 218, 168, .12);
    }

    .cell.correct {
      background: rgba(254, 209, 144, .18);
      border-color: rgba(255, 221, 161, .7);
      box-shadow: 0 0 16px rgba(255, 184, 115, .22);
    }

    .final {
      min-height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 230, 174, .34), transparent 18rem),
        radial-gradient(circle at 50% 100%, rgba(255, 124, 147, .20), transparent 24rem),
        linear-gradient(180deg, #22100f, #0d0808);
      overflow: hidden;
      position: relative;
    }

    .final::before {
      content: "";
      position: absolute;
      inset: -20%;
      background: radial-gradient(circle, rgba(255, 219, 160, .2), transparent 46%);
      animation: glow 4s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { transform: scale(.94); opacity: .45; }
      50% { transform: scale(1.12); opacity: .9; }
    }

    .final-message {
      position: relative;
      z-index: 1;
      max-width: 700px;
      padding: 24px;
      text-align: center;
      color: #fff1df;
      font-size: clamp(20px, 5vw, 34px);
      line-height: 1.42;
      white-space: pre-line;
    }

    @media (max-width: 560px) {
      .app { padding-left: 6px; padding-right: 6px; }
      .shell { padding: 8px 0; }
      .card { border-radius: 18px; padding: 14px 10px; }
      .actions button { width: 100%; }
      .primary { width: 100%; min-width: 0; }
      .word { padding: 10px; border-radius: 15px; }
      .clue { font-size: 13px; }
      .hero-box { border-radius: 20px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <div class="topbar">
        <span id="topStatus">Stage 2 · Від мене — для твого теплого вечора</span>
        <small>Тепло памʼятає кроки</small>
      </div>
      <article class="card">
        <div class="view" id="view"></div>
      </article>
    </div>
  </main>

  <script>
    const STAGE2_COMPLETED_KEY = 'stage2_completed';
    const STAGE2_ANSWERS_KEY = 'stage2_answers';
    const STAGE2_PHASE_KEY = 'stage2_phase';
    const STAGE2_STARTED_KEY = 'stage2_started';

    const words = [
      { clue: 'Що зігріває краще за ковдру?', answer: 'ОБІЙМИ' },
      { clue: 'Те, що хочеться чути перед сном.', answer: 'ГОЛОС' },
      { clue: 'Маленький символ любові ❤️', answer: 'СЕРЦЕ' },
      { clue: 'Те, що залишається після зустрічі.', answer: 'СПОГАД' },
      { clue: 'Те, що ти робиш, коли думаєш про мене.', answer: 'УСМІШКА' },
      { clue: 'Смак ранку разом.', answer: 'КАВА' },
      { clue: 'Те, що гріє всередині.', answer: 'ПОЧУТТЯ' },
      { clue: 'Коли очі говорять більше.', answer: 'ПОГЛЯД' },
      { clue: 'Ніч без тебе.', answer: 'СУМ' },
      { clue: 'Те, що я хочу тримати.', answer: 'РУКА' },
      { clue: 'Твій стан поруч зі мною.', answer: 'СПОКІЙ' },
      { clue: 'Коли час зникає.', answer: 'МИТЬ' },
      { clue: 'Щось дуже ніжне.', answer: 'ДОТИК' },
      { clue: 'Те, що я чекаю.', answer: 'ЗУСТРІЧ' },
      { clue: 'Щось, що ти робиш несвідомо.', answer: 'ДИХАННЯ' },
      { clue: 'Те, що зʼєднує нас.', answer: 'ЗВЯЗОК' },
      { clue: 'Щось, що я памʼятаю завжди.', answer: 'МРІЯ' },
      { clue: 'Коли ти поруч — це…', answer: 'ДІМ' },
      { clue: 'Те, що я хочу сказати.', answer: 'ЛЮБЛЮ' },
      { clue: 'Щось тепле і тихе.', answer: 'ВЕЧІР' },
      { clue: 'Те, що зʼявляється при думці про тебе.', answer: 'РАДІСТЬ' },
      { clue: 'Щось, що не пояснити.', answer: 'МАГІЯ' },
      { clue: 'Те, що між рядками.', answer: 'ТАЄМНИЦЯ' },
      { clue: 'Щось, що веде далі.', answer: 'ШЛЯХ' },
      { clue: 'Завершення всього.', answer: 'ТИ' }
    ];

    const milestones = {
      5: 'Люсіо: Світло стало трохи теплішим… Він знав, що ти знайдеш цей шлях.',
      10: 'Люсіо: Деякі слова не треба відгадувати… вони просто згадуються серцем.',
      15: 'Люсіо: Бачиш? Це вже не просто гра. Сторінка почала відповідати тобі.',
      20: 'Люсіо: Ще трохи… за останніми літерами вже світиться щось дуже тепле.'
    };

    let answers = {};
    let audio = null;
    let ambientNodes = [];

    function normalize(value) {
      return (value || '')
        .toUpperCase()
        .replace(/[’'`ʼ]/g, '')
        .replace(/[^А-ЯҐЄІЇЬ]/g, '');
    }

    function loadAnswers() {
      try {
        answers = JSON.parse(localStorage.getItem(STAGE2_ANSWERS_KEY) || '{}') || {};
      } catch (e) {
        answers = {};
      }
    }

    function saveAnswers() {
      try { localStorage.setItem(STAGE2_ANSWERS_KEY, JSON.stringify(answers)); } catch (e) {}
    }

    function isCompleted() {
      return localStorage.getItem(STAGE2_COMPLETED_KEY) === 'true';
    }

    function solvedCount() {
      return words.filter((word, index) => normalize(answers[index]) === word.answer).length;
    }

    function lucioLine(count) {
      if (count >= 20) return 'Люсіо: Ще трохи… за останніми літерами вже світиться щось дуже тепле. і тепер уже важко зробити вигляд, що це просто кросворд.';
      if (count >= 15) return 'Люсіо: Бачиш? Це вже не просто гра. Сторінка почала відповідати тобі. Деякі слова звучать занадто близько.';
      if (count >= 10) return 'Люсіо: Деякі слова не треба відгадувати… вони просто згадуються серцем. Просто чекала, поки хтось їх поставить у клітинки.';
      if (count >= 5) return 'Люсіо: Світло стало трохи теплішим… Він знав, що ти знайдеш цей шлях.';
      return 'Люсіо: Я поруч, але говоритиму тихо. Нехай слова самі виходять із тепла, яке для тебе залишили.';
    }

    function vibrate(ms = 35) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function ensureAudio() {
      if (audio) return audio;
      try {
        audio = new (window.AudioContext || window.webkitAudioContext)();
        return audio;
      } catch (e) {
        return null;
      }
    }

    function clickSound() {
      const ctx = ensureAudio();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = 520;
      gain.gain.value = 0.035;
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.13);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.14);
    }

    function startAmbient() {
      const ctx = ensureAudio();
      if (!ctx || ambientNodes.length) return;
      const gain = ctx.createGain();
      gain.gain.value = 0.012;
      gain.connect(ctx.destination);
      [128, 192].forEach(freq => {
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.connect(gain);
        osc.start();
        ambientNodes.push(osc);
      });
      ambientNodes.push(gain);
    }

    function typeText(target, text, speed = 22) {
      target.textContent = '';
      let i = 0;
      const timer = setInterval(() => {
        target.textContent += text[i] || '';
        i += 1;
        if (i >= text.length) clearInterval(timer);
      }, speed);
      return timer;
    }

    function showHome() {
      loadAnswers();
      const count = solvedCount();
      const completed = isCompleted();
      const started = localStorage.getItem(STAGE2_STARTED_KEY) === 'true';
      const view = document.getElementById('view');
      document.getElementById('topStatus').textContent = 'Stage 2 · Від мене — для твого теплого вечора';

      let buttonText = 'Розпочати Stage 2';
      let note = 'Це маленька пригода від мене: тиха, тепла й трохи чарівна. Не поспішай — найважливіше тут ховається між рядками.';
      if (completed) {
        buttonText = 'Повернутись до Stage 2';
        note = 'Ти вже пройшла цей етап… але можеш повернутись до нього знову.';
      } else if (started || count > 0) {
        buttonText = 'Продовжити Stage 2';
        note = `Твої кроки збережені: ${count} / 25 відповідей.`;
      }

      view.innerHTML = `
        <section class="hero">
          <div class="hero-box">
            <span class="hero-kicker">Stage 2</span>
            <h1 class="title">Від мене — для твого теплого вечора</h1>
            <p class="subtitle">Це від мене. Наче маленький вогник у долонях: не розкриває таємницю одразу, а тільки кличе зробити перший крок ❤️</p>
            <p class="hero-note">${note}</p>
            <div class="actions">
              <button class="primary" id="startBtn" type="button">${buttonText}</button>
              ${completed ? '<button class="secondary" id="finalBtn" type="button">Переглянути фінал</button>' : ''}
            </div>
          </div>
        </section>`;

      document.getElementById('startBtn').addEventListener('click', () => {
        localStorage.setItem(STAGE2_STARTED_KEY, 'true');
        startAmbient();
        const phase = localStorage.getItem(STAGE2_PHASE_KEY);
        if (completed) showCompleted();
        else if (phase === 'crossword' || count > 0) showCrossword();
        else showIntro();
      });

      const finalBtn = document.getElementById('finalBtn');
      if (finalBtn) finalBtn.addEventListener('click', showFinal);
    }

    function showIntro() {
      localStorage.setItem(STAGE2_STARTED_KEY, 'true');
      localStorage.setItem(STAGE2_PHASE_KEY, 'intro');
      document.getElementById('topStatus').textContent = 'Stage 2 · Перший теплий шепіт';

      const view = document.getElementById('view');
      view.innerHTML = `
        <h2 class="title">Від мене — для твого теплого вечора</h2>
        <p class="subtitle">Тепле світло повільно торкається сторінки. Десь поруч шумить вода, а перші слова зʼявляються так тихо, ніби їх залишили спеціально для тебе.</p>
        <div class="warm-scene">
          <div class="intro-text" id="introText"></div>
        </div>
        <div class="actions">
          <button class="primary" id="introNext" type="button" disabled>Далі</button>
          <button class="secondary" type="button" onclick="showHome()">На початок</button>
        </div>`;

      const text = 'Від мене…\n\nБажаю тобі приємного апетиту 🍽️\nі гарячої, затишної ванни 🛁\n\nРозслабся…\nЦе маленька пригода тільки для тебе ❤️';
      typeText(document.getElementById('introText'), text, 24);

      setTimeout(() => {
        const btn = document.getElementById('introNext');
        btn.disabled = false;
        btn.addEventListener('click', showLucio);
      }, 2600);
    }

    function showLucio() {
      localStorage.setItem(STAGE2_PHASE_KEY, 'lucio');
      document.getElementById('topStatus').textContent = 'Stage 2 · Ліхтарик на стежці';

      const view = document.getElementById('view');
      view.innerHTML = `
        <h2 class="title">Люсіо</h2>
        <p class="subtitle">У темряві прокидається маленький провідник. Він не забирає таємницю — тільки тримає для тебе світло.</p>
        <div class="lucio" id="lucioText"></div>
        <div class="actions">
          <button class="primary" id="lucioNext" type="button" disabled>Відкрити кросворд</button>
          <button class="secondary" type="button" onclick="showHome()">На початок</button>
        </div>`;

      const text = 'Привіт…\nТепер усе трохи інакше.\n\nЯ навчився запам’ятовувати твої кроки — не щоб поспішати тебе, а щоб ти могла повертатися до тепла, коли захочеш.\n\nМене звати Люсіо.\nЯ — маленький ліхтарик на цій стежці.\n\nМене вигадав він, щоб у цій мандрівці ти не йшла сама.\n\nА далі… я просто триматиму світло.';
      typeText(document.getElementById('lucioText'), text, 22);

      setTimeout(() => {
        const btn = document.getElementById('lucioNext');
        btn.disabled = false;
        btn.addEventListener('click', showCrossword);
      }, 3000);
    }

    function showCrossword() {
      localStorage.setItem(STAGE2_STARTED_KEY, 'true');
      localStorage.setItem(STAGE2_PHASE_KEY, 'crossword');
      loadAnswers();
      document.getElementById('topStatus').textContent = 'Stage 2 · Кімната теплих слів';

      const count = solvedCount();
      const view = document.getElementById('view');
      view.innerHTML = `
        <h2 class="title">25 маленьких відчуттів</h2>
        <p class="subtitle">Кожне слово — як тепла іскра на темній доріжці. Відповідай спокійно: коли їх стане більше, кімната сама почне відкриватися.</p>
        <div class="progress-box" id="progress">${count} / 25 відповідей збережено</div>
        <div class="lucio-bubble" id="lucioBubble">${lucioLine(count)}</div>
        <div class="milestones" id="milestones"></div>
        <div class="word-list" id="wordList"></div>
        <div class="actions">
          <button class="secondary" type="button" onclick="showIntro()">Переглянути вступ</button>
          <button class="secondary" type="button" onclick="showHome()">На початок</button>
          <button class="secondary" type="button" onclick="resetStage2()">Скинути Stage 2</button>
        </div>`;

      renderMilestones();
      renderWords();
      updateProgress();
    }

    function renderMilestones() {
      const box = document.getElementById('milestones');
      if (!box) return;
      const count = solvedCount();
      box.innerHTML = '';
      [5, 10, 15, 20].forEach(limit => {
        const div = document.createElement('div');
        div.className = 'milestone' + (count >= limit ? ' visible' : '');
        div.textContent = milestones[limit];
        box.appendChild(div);
      });
    }

    function renderWords() {
      const list = document.getElementById('wordList');
      if (!list) return;
      list.innerHTML = '';

      words.forEach((word, index) => {
        const saved = normalize(answers[index] || '');
        const solved = saved === word.answer;
        const row = document.createElement('section');
        row.className = 'word' + (solved ? ' solved' : '');
        row.dataset.index = index;

        const clue = document.createElement('div');
        clue.className = 'clue';
        clue.textContent = `${index + 1}. ${word.clue}`;
        row.appendChild(clue);

        const cells = document.createElement('div');
        cells.className = 'cells';

        [...word.answer].forEach((letter, letterIndex) => {
          const input = document.createElement('input');
          input.className = 'cell' + (solved ? ' correct' : '');
          input.maxLength = 1;
          input.autocomplete = 'off';
          input.inputMode = 'text';
          input.dataset.index = index;
          input.dataset.letter = letterIndex;
          input.value = saved[letterIndex] || '';
          input.addEventListener('focus', () => row.classList.add('active'));
          input.addEventListener('blur', () => row.classList.remove('active'));
          input.addEventListener('input', () => {
            input.value = normalize(input.value).slice(0, 1);
            collectWord(index);
            if (input.value) {
              const next = cells.querySelector(`[data-letter="${letterIndex + 1}"]`);
              if (next) next.focus();
            }
            checkWord(index);
          });
          input.addEventListener('keydown', event => {
            if (event.key === 'Backspace' && !input.value) {
              const prev = cells.querySelector(`[data-letter="${letterIndex - 1}"]`);
              if (prev) {
                event.preventDefault();
                prev.focus();
              }
            }
            if (event.key === 'Enter') checkWord(index, true);
          });
          cells.appendChild(input);
        });

        row.appendChild(cells);
        list.appendChild(row);
      });
    }

    function collectWord(index) {
      const row = document.querySelector(`.word[data-index="${index}"]`);
      if (!row) return '';
      const value = [...row.querySelectorAll('.cell')].map(input => input.value || '').join('');
      answers[index] = normalize(value);
      saveAnswers();
      return answers[index];
    }

    function checkWord(index, manual = false) {
      const word = words[index];
      const row = document.querySelector(`.word[data-index="${index}"]`);
      if (!row) return;
      const value = collectWord(index);
      if (value.length < word.answer.length) return;

      if (value === word.answer) {
        const wasSolved = row.classList.contains('solved');
        row.classList.add('solved');
        row.querySelectorAll('.cell').forEach(cell => cell.classList.add('correct'));
        if (!wasSolved) {
          vibrate(35);
          clickSound();
        }
        saveAnswers();
        updateProgress();
      } else if (manual) {
        vibrate(80);
      }
    }

    function updateProgress() {
      const count = solvedCount();
      const progress = document.getElementById('progress');
      const lucio = document.getElementById('lucioBubble');
      if (progress) progress.textContent = `${count} / 25 відповідей збережено`;
      if (lucio) lucio.textContent = lucioLine(count);
      renderMilestones();

      if (count >= 25 && !isCompleted()) {
        setTimeout(showFinal, 900);
      }
    }

    function showFinal() {
      localStorage.setItem(STAGE2_COMPLETED_KEY, 'true');
      localStorage.setItem(STAGE2_PHASE_KEY, 'final');
      saveAnswers();
      document.getElementById('topStatus').textContent = 'Stage 2 · Фінал';

      const view = document.getElementById('view');
      view.innerHTML = `
        <h2 class="title">Остання підказка</h2>
        <p class="subtitle">Екран темніє мʼяко, як вечір перед вікном. Голос стає тихішим, щоб не злякати тепло, яке щойно розгорілося.</p>
        <div class="final">
          <div class="final-message" id="finalText"></div>
        </div>
        <div class="actions">
          <button class="primary" type="button" onclick="showHome()">Завершити Stage 2</button>
          <button class="secondary" type="button" onclick="showCrossword()">Повернутися до кросворду</button>
        </div>`;

      const text = 'Люсіо:\n\nТи пройшла…\n\nСлова склалися, світло не згасло, і тепер лишилась остання підказка.\n\nВ шафі…\n\nТам, де стоять діди морози 🎅\n\nНа тебе чекає…\n\nвихідний сюрприз.\n\nІ ще дещо…\n\nЯ дуже скучив, сонечко…\n\nІ скоро буду вдома.\n\nА це тобі…\nдля гарного початку гарних вихідних ❤️';
      typeText(document.getElementById('finalText'), text, 28);
      vibrate(90);
    }

    function showCompleted() {
      loadAnswers();
      document.getElementById('topStatus').textContent = 'Stage 2 · Пройдений етап';

      const view = document.getElementById('view');
      view.innerHTML = `
        <h2 class="title">Ти вже пройшла цей етап…</h2>
        <p class="subtitle">Усе збережено: відповіді, тепло і остання підказка. Двері не зникли — вони просто прикриті до наступного дотику.</p>
        <div class="lucio">Люсіо:\n\nЯ памʼятаю твої кроки.\nЦей етап завершено, але він не зник.\nТи можеш повернутись до кросворду або переглянути фінальне повідомлення ще раз.</div>
        <div class="actions">
          <button class="primary" type="button" onclick="showFinal()">Переглянути фінал</button>
          <button class="secondary" type="button" onclick="showCrossword()">Повернутись до кросворду</button>
          <button class="secondary" type="button" onclick="showHome()">На початок</button>
          <button class="secondary" type="button" onclick="resetStage2()">Скинути Stage 2</button>
        </div>`;
    }

    function resetStage2() {
      const ok = confirm('Стерти прогрес Stage 2 і пройти його заново?');
      if (!ok) return;
      try {
        localStorage.removeItem(STAGE2_COMPLETED_KEY);
        localStorage.removeItem(STAGE2_ANSWERS_KEY);
        localStorage.removeItem(STAGE2_PHASE_KEY);
        localStorage.removeItem(STAGE2_STARTED_KEY);
      } catch (e) {}
      answers = {};
      showHome();
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadAnswers();
      const phase = localStorage.getItem(STAGE2_PHASE_KEY);
      if (isCompleted()) showCompleted();
      else if (phase === 'crossword' || solvedCount() > 0) showCrossword();
      else showHome();
    });
  </script>
</body>
</html>
